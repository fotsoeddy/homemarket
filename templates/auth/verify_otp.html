{% extends 'base.html' %}
{% load static %}

{% block title %}Verify Email - HomeMarket{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center bg-gray-100 p-4 font-montserrat">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden relative">
        <div class="absolute top-0 w-full h-2 bg-gradient-to-r from-primary to-blue-600"></div>
        <div class="p-10 text-center">
            
            <div class="mb-6 flex justify-center">
                 <div class="bg-blue-50 p-4 rounded-full">
                    <img src="{% static 'images/logo/logo.webp' %}" alt="Logo" class="h-16 w-auto">
                 </div>
            </div>
            
            <h2 class="text-3xl font-extrabold text-gray-800 mb-2 font-lato">Verify It's You</h2>
            <p class="text-gray-500 mb-8 text-base px-6">Enter the 6-digit code sent to your email address to activate your account.</p>

            <form method="POST" action="{% url 'users:verify_otp' %}">
                {% csrf_token %}
                
                <div class="mb-8 relative group">
                    <label for="code" class="sr-only">Verification Code</label>
                    
                    <input type="text" name="code" id="code" 
                           class="w-full text-center text-5xl font-bold tracking-[0.5em] py-4 border-2 border-gray-200 rounded-xl focus:border-primary focus:ring-4 focus:ring-blue-50 transition-all duration-300 outline-none placeholder-gray-200 text-gray-700 font-montserrat" 
                           placeholder="000000" maxlength="6" required autofocus autocomplete="off">
                           
                     <div class="absolute inset-0 border-2 border-primary/0 rounded-xl pointer-events-none group-focus-within:border-primary/0 transition-colors"></div>
                </div>

                <button type="submit" class="w-full py-4 text-lg font-semibold bg-primary text-white rounded-xl hover:bg-blue-600 transition duration-200 shadow-lg shadow-blue-500/30 transform hover:-translate-y-0.5">
                    Verify Account
                </button>
            </form>
            
             <p class="mt-8 text-sm text-gray-400">
                Didn't receive the code? <a href="#" class="font-medium text-primary hover:text-blue-700 hover:underline transition-colors">Resend Code</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
