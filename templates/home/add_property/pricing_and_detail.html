<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000080",
                        "background-light": "#f5f5f8",
                        "background-dark": "#0f0f23",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Home Market - Add Property</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header Section -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4 bg-white dark:bg-slate-900">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">home_work</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Home Market</h2>
</div>
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 hover:bg-slate-200 transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</header>
<main class="flex flex-1 justify-center py-8 px-4 md:px-0">
<div class="layout-content-container flex flex-col max-w-[800px] flex-1 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Progress Stepper -->
<div class="flex flex-col gap-3 p-8 border-b border-slate-100 dark:border-slate-800">
<div class="flex gap-6 justify-between items-center">
<p class="text-primary dark:text-blue-400 text-lg font-semibold">Step 2 of 5: Pricing and Details</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">40% Complete</p>
</div>
<div class="h-2.5 w-full rounded-full bg-slate-100 dark:bg-slate-800">
<div class="h-2.5 rounded-full bg-primary" style="width: 40%;"></div>
</div>
</div>
<!-- Form Content -->
<div class="p-8 space-y-8">
<section>
<h3 class="text-slate-900 dark:text-white text-2xl font-bold mb-6">Financials &amp; Size</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Price Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold uppercase tracking-wider">Asking Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-4 pl-8 pr-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="500,000" type="text"/>
</div>
</div>
<!-- Area Input -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold uppercase tracking-wider">Living Area (sqft)</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-4 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="e.g. 2,400" type="number"/>
</div>
<!-- Bedrooms -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold uppercase tracking-wider">Bedrooms</label>
<select class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-4 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
<option>1</option>
<option>2</option>
<option selected="">3</option>
<option>4</option>
<option>5+</option>
</select>
</div>
<!-- Bathrooms -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold uppercase tracking-wider">Bathrooms</label>
<select class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-4 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
<option>1</option>
<option selected="">2</option>
<option>2.5</option>
<option>3</option>
<option>4+</option>
</select>
</div>
<!-- Year Built -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold uppercase tracking-wider">Year Built</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-4 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="2020" type="number"/>
</div>
<!-- Lot Size -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold uppercase tracking-wider">Lot Size (acres)</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-4 px-4 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="0.25" type="text"/>
</div>
</div>
</section>
<section>
<h3 class="text-slate-900 dark:text-white text-2xl font-bold mb-6">Premium Features</h3>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
<!-- Feature Checkbox 1 -->
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer transition-colors group">
<input class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">pool</span>
<span class="text-slate-700 dark:text-slate-300 font-medium">Swimming Pool</span>
</label>
<!-- Feature Checkbox 2 -->
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer transition-colors group">
<input class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">home_iot_device</span>
<span class="text-slate-700 dark:text-slate-300 font-medium">Smart Home</span>
</label>
<!-- Feature Checkbox 3 -->
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer transition-colors group">
<input class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">wine_bar</span>
<span class="text-slate-700 dark:text-slate-300 font-medium">Wine Cellar</span>
</label>
<!-- Feature Checkbox 4 -->
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer transition-colors group">
<input class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">park</span>
<span class="text-slate-700 dark:text-slate-300 font-medium">Garden</span>
</label>
<!-- Feature Checkbox 5 -->
<label class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer transition-colors group">
<input class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">security</span>
<span class="text-slate-700 dark:text-slate-300 font-medium">Security System</span>
</label>
</div>
</section>
</div>
<!-- Footer Navigation -->
<div class="p-8 flex items-center justify-between border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
<button class="flex items-center gap-2 px-6 py-3 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
                        Back
                    </button>
<button class="flex items-center gap-2 px-8 py-3 rounded-xl bg-primary text-white font-bold hover:opacity-90 transition-opacity shadow-lg shadow-primary/20">
                        Continue
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</main>
<footer class="py-10 text-center text-slate-400 text-sm">
<p>© 2024 Home Market Inc. All rights reserved.</p>
</footer>
</div>
</div>
</body></html>
