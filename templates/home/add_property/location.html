<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000080",
                        "background-light": "#f5f5f8",
                        "background-dark": "#0f0f23",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Add New Property - Home Market</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between border-b border-primary/10 bg-white dark:bg-slate-900 px-6 py-4 md:px-20 lg:px-40">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center size-10 bg-primary rounded-lg text-white">
<span class="material-symbols-outlined">home_work</span>
</div>
<h2 class="text-primary dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Home Market</h2>
</div>
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex flex-1 justify-center py-8 px-4 md:px-0">
<div class="layout-content-container flex flex-col w-full max-w-[800px] gap-8">
<!-- Progress Stepper -->
<div class="flex flex-col gap-4 px-4">
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="text-primary/60 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">Step 3 of 5</span>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mt-1">Property Location</h1>
</div>
<p class="text-primary font-bold text-lg">60%</p>
</div>
<div class="h-3 w-full rounded-full bg-primary/10 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 60%;"></div>
</div>
</div>
<!-- Form Section -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4">
<div class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Street Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/40">location_on</span>
<input class="form-input w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 dark:border-slate-700 pl-12 h-14 focus:border-primary focus:ring-1 focus:ring-primary" placeholder="123 Luxury Avenue" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">City</label>
<input class="form-input w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 dark:border-slate-700 px-4 h-14 focus:border-primary focus:ring-1 focus:ring-primary" placeholder="San Francisco" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">State / Province</label>
<input class="form-input w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 dark:border-slate-700 px-4 h-14 focus:border-primary focus:ring-1 focus:ring-primary" placeholder="California" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">ZIP Code</label>
<input class="form-input w-full rounded-xl border-primary/20 bg-white dark:bg-slate-800 dark:border-slate-700 px-4 h-14 focus:border-primary focus:ring-1 focus:ring-primary" placeholder="94103" type="text"/>
</div>
</div>
</div>
<!-- Map Picker Component -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Confirm Pin Location</label>
<div class="relative w-full h-[320px] rounded-xl overflow-hidden border border-primary/10 shadow-lg group">
<img alt="Map view showing San Francisco area" class="w-full h-full object-cover" data-alt="Detailed city map with street grids and parks" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgjawh5_t51e6q9Q__IKqwuL-dW6m-XYp6TV4w4X7myQ_H8DjPeVfanBIVhHIeHRmDK4VE_r-vhwQC3eOZUyd-9ry9erov53_aRbg424x188JX5_tbiPdFk11tbw-NyIGa-CAlsrzRLt50CCXA_2J1TymTe7hGJNWC2On6xAIVDVPbnu24dKNhg4jlrmXzJyAFTS26MGdVN2QQKAWhsGICe7H3THvjgalAEKFmSZq211YMSVaDjTf_ODW1KlkGEH3x5kj6rDxFwzs"/>
<!-- Map Overlay UI -->
<div class="absolute inset-0 bg-primary/5 pointer-events-none"></div>
<!-- Floating Pin -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-full flex flex-col items-center">
<div class="bg-primary text-white p-2 rounded-lg shadow-xl mb-1 text-xs font-bold whitespace-nowrap">
                                        Your Property
                                    </div>
<span class="material-symbols-outlined text-primary text-5xl drop-shadow-md" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<!-- Map Controls -->
<div class="absolute bottom-4 right-4 flex flex-col gap-2">
<button class="bg-white dark:bg-slate-800 p-2 rounded-lg shadow-md hover:bg-slate-50 text-slate-700 dark:text-white">
<span class="material-symbols-outlined">add</span>
</button>
<button class="bg-white dark:bg-slate-800 p-2 rounded-lg shadow-md hover:bg-slate-50 text-slate-700 dark:text-white">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<div class="absolute top-4 right-4">
<button class="bg-white dark:bg-slate-800 px-3 py-1.5 rounded-lg shadow-md hover:bg-slate-50 text-slate-700 dark:text-white text-xs font-bold flex items-center gap-1">
<span class="material-symbols-outlined text-sm">my_location</span>
                                        Recenter
                                    </button>
</div>
</div>
<p class="text-xs text-slate-500 mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-sm">info</span>
                                Drag the map to adjust the exact location of your property
                            </p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex items-center justify-between mt-8 px-4 border-t border-primary/10 pt-8 pb-12">
<button class="flex items-center gap-2 px-8 h-14 rounded-xl border-2 border-primary/20 text-primary font-bold hover:bg-primary/5 transition-all">
<span class="material-symbols-outlined">arrow_back</span>
                            Back
                        </button>
<button class="flex items-center gap-2 px-12 h-14 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/30 hover:opacity-90 transition-all">
                            Next Step
                            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Footer Meta -->
<footer class="py-6 text-center text-slate-400 text-sm">
<p>© 2024 Home Market Inc. Secure Property Listing Service.</p>
</footer>
</div>
</div>
</body></html>
